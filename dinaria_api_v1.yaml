  # ── Reusable responses ────────────────────────────────────

  responses:
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: unauthorized
              message: Missing or invalid API key.

    Forbidden:
      description: Valid key but insufficient permission.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            merchant_forbidden:
              value:
                error:
                  code: forbidden
                  message: Merchant does not belong to your account.
                  param: merchantId
            currency_not_enabled:
              value:
                error:
                  code: currency_not_enabled
                  message: Currency BRL is not enabled for your account.
                  param: currency
            payout_not_enabled:
              value:
                error:
                  code: payout_not_enabled
                  message: Payouts are not enabled for this merchant.

    NotFound:
      description: Resource not found.
      content:
