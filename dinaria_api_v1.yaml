          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: not_found
              message: Payment not found.

    Conflict:
      description: Idempotency-Key reused with a different request body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: idempotency_key_reused
              message: The Idempotency-Key was reused with a different request payload.

# ─────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────
paths:

  # ── Account ───────────────────────────────────────────────

  /balance:
    get:
      tags: [Account]
      summary: Get account balance
      description: |
        Returns the current balance for your account, broken down by currency.

        Requires an **account-scoped API key** — not a merchant key.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Account balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountId:
                    type: string
                    example: acme_br
                  balances:
                    type: array
                    items:
                      type: object
                      properties:
                        currency:
                          type: string
                          example: BRL
                        balance:
                          type: string
                          example: "34.60"
              example:
                accountId: acme_br
                balances:
                  - currency: BRL
                    balance: "34.60"
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              example:
                code: unauthorized
                message: Invalid or missing API key.

  # ── Pay-in ────────────────────────────────────────────────

  /payments:
    post:
      tags: [Payments]
      summary: Create a payment
      description: |
        Creates a pay-in order. Returns transfer instructions in `paymentData`
        to display to the customer.

        **ARS**: Display `paymentData.cbu` and `paymentData.reference`. The customer
        initiates a CBU/CVU bank transfer and **must include the reference in the
        transfer concept/description field**. The reconciler matches it automatically.

        **BRL** — two methods (choose with `paymentMethod`):

        - `instant_bank_transfer` *(default)* — `paymentData.type = "pix_transfer"`:
          display `paymentData.pixKey` and `paymentData.reference`. The customer
          initiates a PIX transfer using the reference as the description. The
          reconciler matches by CPF/CNPJ + amount. Order expiration is
          merchant-controlled.
        - `pix_qr` — `paymentData.type = "pix_qr"`: a per-order dynamic PIX QR
          (BR-Code) is minted by Transfero. Display `paymentData.qrCodeBase64`
          inline (`<img src="data:image/png;base64,...">`) or render
          `paymentData.qrCodeString` with any QR encoder; "copy-and-paste PIX"
          is supported by showing the same string verbatim. **The QR (and
          order) expire in 15 minutes** — any merchant-supplied `expiresAfter`
          or `expiration` is ignored. The reconciler binds the credit to this
          order via the QR's embedded `externalId`, giving guaranteed 1:1
          matching even when the payer's tax ID is unknown ahead of time.

        Payments are single-use. Create a new one for each attempt.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
            examples:
              ars_cuit:
                $ref: "#/components/examples/PaymentRequestARS"
              ars_dni:
                $ref: "#/components/examples/PaymentRequestARSDNI"
              brl_cpf:
                $ref: "#/components/examples/PaymentRequestBRL"
              brl_cnpj:
                $ref: "#/components/examples/PaymentRequestBRLCNPJ"
              brl_pix_qr:
                $ref: "#/components/examples/PaymentRequestBRLPixQR"
      responses:
        "200":
          description: Payment created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
              examples:
                ars_started:
                  $ref: "#/components/examples/PaymentResponseARS"
                brl_started:
                  $ref: "#/components/examples/PaymentResponseBRL"
                brl_pix_qr_started:
                  $ref: "#/components/examples/PaymentResponseBRLPixQR"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_document:
                  value:
                    error:
                      code: invalid_document
                      message: customer.documentNumber must be a valid cuit or dni for AR.
                      param: customer.documentNumber
                missing_field:
                  value:
                    error:
                      code: invalid_request
                      message: merchantId, amount and currency are required.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

    get:
      tags: [Payments]
      summary: List payments
      description: |
        Returns pay-in orders for the authenticated merchant, newest first.

        **Merchant-scoped key**: returns payments for that merchant only.
        The `merchantId` query parameter is ignored — the scope is fixed by the key.

        **Account-scoped key**: returns payments across all merchants in the account.
        Optionally pass `?merchantId=` to narrow to a single merchant.

        **Operator key**: returns all payments. Use `?merchantId=` to filter.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [started, confirmed, cancelled, expired]
          description: Filter by payment status.
        - name: currency
          in: query
          schema:
            type: string
            example: BRL
          description: Filter by currency code (e.g. `BRL`, `ARS`).
        - name: merchantId
          in: query
          schema:
            type: string
          description: |
            Filter by merchant. Only effective for account-scoped or operator keys.
            Ignored for merchant-scoped keys (scope is fixed by the key).
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Number of results to return per page.
        - name: startingAfter
          in: query
          schema:
            type: string
          description: |
            Cursor pagination — pass the `transactionId` of the last item in the
            previous page to retrieve the next page.
      responses:
        "200":
          description: List of payments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"
              example:
                object: list
                hasMore: false
                data:
                  - transactionId: a3f7c821-4b2e-4c1a-9d3f-7e8b9c0d1e2f
                    merchantId: acme_merch1
                    amount: "150.00"
                    currency: BRL
                    status: confirmed
                    createdAt: "2026-03-11T22:57:40Z"
                    paymentData:
                      type: pix_transfer
                      pixKey: bc8ba248-fb33-4022-bea1-c9fab2efd341
                      pixKeyType: random
                      reference: a3f7c821-4b2e-4c1a-9d3f-7e8b9c0d1e2f
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /payments/{transactionId}:
    get:
      tags: [Payments]
      summary: Retrieve a payment
      description: |
        Returns the current state of a payment.

        Use this to check status after creation or to reconcile when webhooks are delayed.
        Prefer webhooks for production integrations — do not poll aggressively.
      parameters:
        - $ref: "#/components/parameters/TransactionIdPath"
      responses:
        "200":
          description: Payment details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
              examples:
                ars_confirmed:
                  $ref: "#/components/examples/PaymentResponseARSConfirmed"
                ars_started:
                  $ref: "#/components/examples/PaymentResponseARS"
                brl_started:
                  $ref: "#/components/examples/PaymentResponseBRL"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /payments/{transactionId}/cancel:
    post:
      tags: [Payments]
      summary: Cancel a payment
      description: |
        Cancels a payment that is in `started` status.

        Use this when the end-user abandons the flow, the order is voided on
        your side, or you need to clear stale orders so that subsequent
        CUIT/CUIL-based matching works correctly.

        Only `started` payments can be cancelled. Payments that have already
        reached a terminal state (`confirmed`, `cancelled`, `expired`) will be
        rejected with `422 invalid_status`.

        A `payment.status_changed` webhook is dispatched immediately after a
        successful cancellation.
      parameters:
        - $ref: "#/components/parameters/TransactionIdPath"
      responses:
        "200":
          description: Payment successfully cancelled. Returns the updated payment object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Payment is not in a cancellable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: invalid_status
                  message: "Only payments in 'started' status can be cancelled. Current status: confirmed."

  # ── Payouts ───────────────────────────────────────────────

  /payouts:
    post:
      tags: [Payouts, Stablecoin Settlement]
      summary: Create a payout
      description: |
        Sends money out to a customer's bank account.

        The merchant's balance is debited immediately at creation time.
        Processing happens asynchronously every ~5 minutes via the payout processor.

        **ARS CBU alias**: set `destination.identifierType` to `alias_cbu` and `destination.identifierValue`
        to the alias (e.g. `mialiascbu`) — the real CBU, CUIT, and name are resolved automatically before sending.

        **ARS CUIT auto-resolution**: `destination.taxId` is optional for `cbu` type — the platform
        resolves it from the CBU automatically. Providing it explicitly skips the lookup.

        **BRL PIX key**: use `destination.identifierType` of `pix_key_cpf`, `pix_key_cnpj`,
        `pix_key_email`, `pix_key_phone`, or `pix_key_random`. The value must be the recipient's
        registered PIX key — a CNPJ is only valid if explicitly registered as a PIX key by the recipient.

        **On-ramp (BRL → USDT)**: set `destination.identifierType` to `tron_address` and
        `destination.identifierValue` to the recipient's Tron wallet address. The conversion is
        executed synchronously — the response is returned with `status: "completed"` and the confirmed
        `exchangeRate`, `destinationAmount`, and `destinationCurrency`. Use `GET /payouts/rates` first
        to check indicative prices. Optionally set `destination.settlement` to `D0` (default), `D1`, or `D2`.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutRequest"
            examples:
              cbu:
                $ref: "#/components/examples/PayoutRequestARS"
              alias:
                $ref: "#/components/examples/PayoutRequestARSAlias"
              brl_pix_cpf:
                $ref: "#/components/examples/PayoutRequestBRLPix"
              brl_pix_random:
                $ref: "#/components/examples/PayoutRequestBRLPixRandom"
              on_ramp:
                $ref: "#/components/examples/PayoutRequestOnRamp"
      responses:
        "201":
          description: |
            Payout created. For standard payouts (ARS/BRL) status will be `pending` until the
            processor submits the transfer. For on-ramp (`tron_address`) the conversion is
            synchronous and status is `completed` in the same response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutResponse"
              examples:
                pending:
                  $ref: "#/components/examples/PayoutResponsePending"
                on_ramp:
                  $ref: "#/components/examples/PayoutResponseOnRamp"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: invalid_request
                  message: amount and currency are required.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Insufficient merchant balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: insufficient_balance
                  message: Merchant balance is insufficient for this payout.
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

    get:
      tags: [Payouts]
      summary: List payouts
      description: Returns payouts for the authenticated merchant, newest first.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, processing, completed, failed]
          description: Filter by status.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: startingAfter
          in: query
          schema:
            type: string
          description: Cursor pagination — pass the `id` of the last item in the previous page.
      responses:
        "200":
          description: List of payouts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /payouts/rates:
    get:
      tags: [Stablecoin Settlement]
      summary: Get indicative BRL/USDT rate
      description: |
        Returns an indicative BRL→USDT exchange rate without locking a quote.
        If this endpoint returns a price, the market is open and on-ramp is available.
      parameters:
        - name: fromCurrency
          in: query
          schema:
            type: string
            default: BRL
          description: Source currency. Currently only `BRL` is supported.
        - name: toCurrency
          in: query
          schema:
            type: string
            default: USDT
          description: Destination currency. Currently only `USDT` is supported.
        - name: settlement
          in: query
          schema:
            type: string
            enum: [D0, D1, D2]
            default: D0
          description: Settlement window.
      responses:
        "200":
          description: Indicative rate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutRatesResponse"
              example:
                fromCurrency: BRL
                toCurrency: USDT
                price: 5.72
                settlement: D0
                indicativeAt: "2026-04-03T14:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: On-ramp not configured for this environment.

  # ── Blockchain Access ─────────────────────────────────────

  /v1/chains/networks:
    get:
      tags: [Blockchain Access]
      summary: List networks
      description: Returns all blockchain networks Dinaria supports.
      responses:
        "200":
          description: List of networks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TronNetworkListResponse"
              example:
                object: list
                data:
                  - code: mainnet
                    type: tron
                    displayName: Tron Mainnet
                    isActive: true
                  - code: shasta
                    type: tron
                    displayName: Tron Shasta (Testnet)
                    isActive: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/chains/networks/{code}:
    get:
      tags: [Blockchain Access]
      summary: Get network details
      description: Returns RPC configuration, catalog assets, and status for a specific network.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
            enum: [mainnet, shasta]
          description: Network code.
      responses:
        "200":
          description: Network detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TronNetworkDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/chains/tron/addresses/{address}/balance:
    get:
      tags: [Blockchain Access]
      summary: Get address balance
      description: |
        Returns the TRX balance (in sun) for any Tron address, and optionally one or more
        TRC-20 token balances. Pass `contracts` once or multiple times, or as a comma-separated value.

        `trxSun` is the TRX balance in sun (1 TRX = 1,000,000 sun). Token `balance` is in the
        token's smallest unit — divide by `10^decimals` for the human-readable amount.
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
          description: Tron address in base58check format (`T…`).
          example: TQn9Y2khEsLJW1ChVWFMSMeRDow5KcbLSE
        - name: network
          in: query
          schema:
            type: string
            enum: [mainnet, shasta]
            default: mainnet
          description: Target network. Can also be set via `X-Network` header.
        - name: contracts
          in: query
          schema:
            type: string
          description: |
            Optional. TRC-20 contract address(es) to include token balances for.
            Repeat the parameter or use comma-separated values. Contract must exist in Dinaria's catalog.
          example: TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t
      responses:
        "200":
          description: Address balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TronAddressBalanceResponse"
              example:
                address: TQn9Y2khEsLJW1ChVWFMSMeRDow5KcbLSE
                network: mainnet
                trxSun: "1500000000"
                tokens:
                  - contract: TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t
                    symbol: USDT
                    decimals: 6
                    balance: "50000000"
        "400":
          description: Invalid address or contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Unknown contract in catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/chains/tron/contracts/{contract}/balance:
    get:
      tags: [Blockchain Access]
      summary: Get TRC-20 token balance
      description: Returns the TRC-20 token balance of a specific owner address for a given contract.
      parameters:
        - name: contract
          in: path
          required: true
          schema:
            type: string
          description: TRC-20 contract address. Must exist in Dinaria's catalog.
          example: TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t
        - name: owner
          in: query
          required: true
          schema:
            type: string
          description: Address whose balance to query.
          example: TQn9Y2khEsLJW1ChVWFMSMeRDow5KcbLSE
        - name: network
          in: query
          schema:
            type: string
            enum: [mainnet, shasta]
            default: mainnet
      responses:
        "200":
          description: Token balance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TronContractBalanceResponse"
              example:
                contract: TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t
                owner: TQn9Y2khEsLJW1ChVWFMSMeRDow5KcbLSE
                balance: "50000000"
                decimals: 6
        "400":
          description: Invalid address or missing owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Unknown contract in catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/chains/tron/contracts/{contract}/allowance:
    get:
      tags: [Blockchain Access]
      summary: Get TRC-20 allowance
      description: Returns how much a spender is approved to transfer on behalf of an owner.
      parameters:
        - name: contract
          in: path
          required: true
          schema:
            type: string
          description: TRC-20 contract address.
          example: TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t
        - name: owner
          in: query
          required: true
          schema:
            type: string
          description: Address that granted the allowance.
          example: TOwnerAddress...
        - name: spender
          in: query
          required: true
          schema:
            type: string
          description: Address that may spend on owner's behalf.
          example: TSpenderAddress...
        - name: network
          in: query
          schema:
            type: string
            enum: [mainnet, shasta]
            default: mainnet
      responses:
        "200":
          description: Allowance amount.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TronAllowanceResponse"
              example:
                contract: TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t
                owner: TOwnerAddress...
                spender: TSpenderAddress...
                allowance: "0"
                decimals: 6
        "400":
          description: Invalid address or missing parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Unknown contract in catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/chains/tron/transactions/broadcast:
    post:
      tags: [Blockchain Access]
      summary: Broadcast a transaction
      description: |
        Submits a pre-signed Tron transaction to the network via Dinaria's full node.
        Your private key **never** leaves your system — you sign locally and pass only the signed transaction object.

        The `X-Idempotency-Key` header is required. Reusing the same key with the same body returns
        the original response without re-broadcasting.
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
          description: UUID or unique string to prevent duplicate broadcasts on retry.
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TronBroadcastRequest"
            example:
              network: mainnet
              signedTransaction:
                raw_data:
                  contract: []
                  timestamp: 1712000000000
                  expiration: 1712003600000
                raw_data_hex: "0a02..."
                txID: a1b2c3...
                signature: ["3045..."]
      responses:
        "200":
          description: Transaction submitted. Poll `GET /v1/chains/tron/transactions/{submissionId}` for confirmation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TronBroadcastResponse"
              example:
                submissionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                status: pending
                network: mainnet
                txid: a1b2c3d4...
                submittedAt: "2026-04-03T14:01:05Z"
        "400":
          description: Invalid request or node rejection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "502":
          description: All configured RPC nodes failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/chains/tron/transactions/dry-run:
    post:
      tags: [Blockchain Access]
      summary: Dry-run a transaction
      description: |
        Estimates energy consumption without broadcasting. Use before submitting to check fee cost.
        Passes the signed transaction through Tron's `triggerconstantcontract` and returns the wrapped result.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TronBroadcastRequest"
            example:
              network: mainnet
              signedTransaction:
                raw_data_hex: "0a02..."
                txID: a1b2c3...
                signature: ["3045..."]
      responses:
        "200":
          description: Dry-run result from the Tron node.
          content:
            application/json:
              example:
                httpStatus: 200
                result:
                  energy_used: 13382
                  constant_result: ["..."]
                  result:
                    result: true
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/chains/tron/transactions/{submissionId}:
    get:
      tags: [Blockchain Access]
      summary: Get submission status
      description: Retrieve the status of a previously broadcast transaction by its Dinaria submission ID.
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The `submissionId` returned by `POST /v1/chains/tron/transactions/broadcast`.
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        "200":
          description: Submission status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TronSubmissionResponse"
              examples:
                pending:
                  summary: Transaction pending on-chain
                  value:
                    submissionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                    status: pending
                    network: mainnet
                    txid: null
                    submittedAt: "2026-04-03T14:01:05Z"
                confirmed:
                  summary: Transaction confirmed
                  value:
                    submissionId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                    status: confirmed
                    network: mainnet
                    txid: a1b2c3d4e5f6...
                    submittedAt: "2026-04-03T14:01:05Z"
        "400":
          description: Invalid submission ID format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /payouts/{payoutId}:
    get:
      tags: [Payouts]
      summary: Retrieve a payout
      parameters:
        - $ref: "#/components/parameters/PayoutIdPath"
      responses:
        "200":
          description: Payout details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutResponse"
              examples:
                completed:
                  $ref: "#/components/examples/PayoutResponseCompleted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Merchant settings ─────────────────────────────────────

  /merchants/{id}/settings:
    put:
      tags: [Merchant Settings]
      summary: Update merchant settings
      description: |
        Configures per-merchant reconciliation behaviour.
        All fields are optional — send only the ones you want to change.

        **`defaultTransferExpirationHours`**: governs *incoming bank transfers* with no
        matching order. Only relevant when `refundPolicy` is `on_expiration`.

        **`defaultOrderExpirationHours`**: governs *payment orders* created via POST /payments.
        An explicit `expiration` value on the order takes precedence.

        **`refundPolicy`**:
        - `on_reception`: unmatched transfers are refunded immediately upon arrival.
        - `on_expiration`: transfers are held for `defaultTransferExpirationHours`, then refunded.
      parameters:
        - $ref: "#/components/parameters/MerchantIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantSettingsRequest"
            examples:
              expiration_policy:
                summary: Hold transfers 24h, orders expire after 48h
                value:
                  defaultTransferExpirationHours: 24
                  defaultOrderExpirationHours: 48
                  refundPolicy: on_expiration
              immediate_refund:
                summary: Refund immediately, orders never expire
                value:
                  refundPolicy: on_reception
      responses:
        "200":
          description: Settings updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantSettingsResponse"
              example:
                merchantId: acme_ars_merch1
                defaultTransferExpirationHours: 24
                defaultOrderExpirationHours: 48
                refundPolicy: on_expiration
        "400":
          description: Invalid value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: invalid_request
                  message: defaultTransferExpirationHours must be >= 0.
                  param: defaultTransferExpirationHours
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Webhooks ──────────────────────────────────────────────

  /webhooks/payments:
    get:
      tags: [Webhooks]
      summary: List registered webhook URLs
      description: |
        Returns webhook URLs for your API key scope. **Secrets are never returned.**
        Use a **merchant-scoped** or **account-scoped** key consistent with how you registered.
      responses:
        "200":
          description: List of registrations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
              example:
                object: list
                data:
                  - webhookUrl: https://your-server.com/webhooks/dinaria
                    scope: merchant
                    createdAt: "2026-03-10T12:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Webhooks]
      summary: Register a webhook URL
      description: |
        Registers the HTTPS URL on your server where the platform will deliver payment status events.

        Call this once during setup. If your URL changes, call again to update it.
        This endpoint is called **by you** — it does not deliver any events itself.

        **Scope** matches your API key: a **merchant-scoped** key ties the registration to that merchant;
        an **account-scoped** key registers at account level (all merchants under the account).

        The `webhookSecret` is returned **only once**. Store it securely in a secret manager.
        You will use it to verify the `X-Webhook-Signature` on every incoming event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRegistrationRequest"
            example:
              webhookUrl: https://your-server.com/webhooks/dinaria
      responses:
        "201":
          description: Webhook registered. Save the `webhookSecret` — shown only once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookRegistrationResponse"
              example:
                webhookUrl: https://your-server.com/webhooks/dinaria
                webhookSecret: whsec_9f3c2a1b7d5e4c3a...
                createdAt: "2026-03-10T12:00:00Z"
        "400":
          description: Invalid webhook URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Webhooks]
      summary: Deregister a webhook URL
      description: |
        Removes the registration for the given `webhookUrl` within your API key scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookDeleteRequest"
            example:
              webhookUrl: https://your-server.com/webhooks/dinaria
      responses:
        "204":
          description: Webhook removed.
        "400":
          description: Missing or invalid body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No registration found for this URL and scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/payments/rotate-secret:
    post:
      tags: [Webhooks]
      summary: Rotate webhook secret
      description: |
        Issues a new signing secret for your registered webhook endpoint.
        The new `webhookSecret` is returned only once — store it immediately.

        **Merchant-scoped API key:** send `webhookUrl` when you have multiple URLs registered; otherwise
        the single registration for that merchant is rotated. Do **not** send `merchantId`.

        **Account-scoped API key:** omit `merchantId` to rotate the account-level registration, or set
        `merchantId` to rotate that merchant's registration. Use `webhookUrl` when needed to pick a URL.

        Equivalent paths (same handler): `/webhooks/payments/rotate`, `/webhooks/rotate-secret`, `/webhooks/rotate`.
        If you terminate TLS on a reverse proxy, ensure these paths are forwarded (not only an exact match on `/webhooks/payments`).

        If `previousSecretExpiresAt` is set, the old secret remains valid until that time
        (grace period), giving you time to deploy the new secret before the old one stops working.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRotateRequest"
            examples:
              merchantScoped:
                summary: Merchant-scoped key (typical)
                value:
                  webhookUrl: https://your-server.com/webhooks/dinaria
              accountScoped:
                summary: Account-scoped key, account-level webhook
                value:
                  webhookUrl: https://your-server.com/webhooks/dinaria
              accountScopedMerchant:
                summary: Account-scoped key, merchant-specific webhook
                value:
                  merchantId: acme_merch_1
                  webhookUrl: https://your-server.com/webhooks/dinaria
      responses:
        "200":
          description: Secret rotated. Save the new `webhookSecret`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookRotateResponse"
              example:
                webhookUrl: https://your-server.com/webhooks/dinaria
                webhookSecret: whsec_2b91d0f6a1d34f0b...
                rotatedAt: "2026-03-10T13:00:00Z"
                previousSecretExpiresAt: "2026-03-11T13:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: No matching webhook registration for this key and request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/payments/updates:
    post:
      tags: [Webhooks]
      summary: Receive payment events (endpoint on your server)
      description: |
        **This endpoint is on YOUR server.** The platform calls it when a payment changes status.
        Do not call this endpoint yourself.

        **Signature verification** (required before processing):
        1. Read the raw request body — do not parse JSON first.
        2. Check `X-Webhook-Timestamp` is within ±5 minutes of now (replay protection).
        3. Build the signed payload: `<timestamp>.<raw_body>`
        4. Compute `HMAC_SHA256(webhookSecret, signed_payload)`
        5. Compare (constant-time) with the `v1=` value in `X-Webhook-Signature`.
        6. Reject with HTTP 401 if verification fails.

        Respond with **HTTP 200 immediately**. Process the event asynchronously.
        Delivery is at-least-once — deduplicate by **`eventId`** (unique per delivery; the same payment may be referenced across retries with the same `eventId`).
      parameters:
        - name: X-Webhook-Timestamp
          in: header
          required: true
          description: Unix timestamp in seconds.
          schema:
            type: integer
            example: 1741612800
        - name: X-Webhook-Signature
          in: header
          required: true
          description: "Format: `t=<timestamp>,v1=<hex_hmac_sha256>`"
          schema:
            type: string
            example: "t=1741612800,v1=9d0c...ab12"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPaymentEvent"
            examples:
              ars_confirmed:
                $ref: "#/components/examples/WebhookConfirmedARS"
              brl_confirmed:
                $ref: "#/components/examples/WebhookConfirmedBRL"
      responses:
        "200":
          description: Event received. Always respond 200 as quickly as possible.
